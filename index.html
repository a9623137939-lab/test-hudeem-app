<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Тест Худеем — уведомления</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f0f12;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #eeeeee;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }
        .app-container { max-width: 600px; margin: 0 auto; }
        .card {
            background-color: #1e1e24;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #b9b3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .sub {
            color: #a0a0b0;
            font-size: 14px;
            margin-bottom: 24px;
            border-left: 3px solid #6c5ce7;
            padding-left: 12px;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #cdcddf;
        }
        input {
            width: 100%;
            background-color: #2c2c34;
            border: 1px solid #3a3a44;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 16px;
            color: #ffffff;
            outline: none;
        }
        .btn-group, .flex-buttons { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
        button {
            background-color: #2c2c34;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            color: #eeeeee;
            cursor: pointer;
            flex: 1 0 auto;
        }
        .btn-primary { background-color: #6c5ce7; color: white; }
        .btn-secondary { background-color: #2c2c34; border: 1px solid #4a4a56; }
        .test-btn {
            background-color: #6c5ce7;
            width: 100%;
            margin-top: 16px;
        }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background-color: rgba(44,44,52,0.95);
            border-left: 4px solid #6c5ce7;
            border-radius: 60px;
            padding: 12px 24px;
            color: #f0f0f0;
            font-weight: 500;
            font-size: 15px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        @media (max-width: 500px) {
            .toast-notification { white-space: normal; text-align: center; max-width: 85%; }
        }
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 8px 0;
        }
        .collapsible-header .title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .arrow {
            font-size: 24px;
            transition: transform 0.2s ease;
        }
        .arrow.up { transform: rotate(180deg); }
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            margin-top: 0;
        }
        .collapsible-content.show {
            max-height: 800px;
            transition: max-height 0.4s ease-in;
            margin-top: 20px;
        }
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3a3a44; transition: 0.2s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 2px; bottom: 2px;
            background-color: white; transition: 0.2s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #6c5ce7; }
        input:checked + .slider:before { transform: translateX(24px); }
        .time-select, .weekday-select {
            background-color: #2c2c34;
            border-radius: 16px;
            padding: 10px;
            border: 1px solid #3a3a44;
            color: white;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="card">
        <h1>🧪 Тест Худеем</h1>
        <div class="sub">Проверка уведомлений (только тест)</div>
        <div class="form-group">
            <label>📆 Дата</label>
            <input type="date" id="dateInput">
        </div>
        <div class="form-group">
            <label>⚡ Вес (кг)</label>
            <input type="number" id="weightInput" step="0.1" placeholder="например, 72.5">
            <div id="weightError" class="error-msg"></div>
        </div>
        <div class="btn-group">
            <button id="saveBtn" class="btn-primary">💾 Сохранить вес (тест)</button>
        </div>
    </div>

    <div class="card">
        <div class="collapsible-header" id="notifHeader">
            <div class="title"><span>🔔</span> Настройка уведомлений (тест)</div>
            <span class="arrow" id="headerArrow">▼</span>
        </div>
        <div class="collapsible-content" id="notifContent">
            <div class="settings-row">
                <span>Ежедневное напоминание</span>
                <label class="switch"><input type="checkbox" id="dailyEnabled"><span class="slider"></span></label>
            </div>
            <div class="settings-row">
                <label>Время отправки</label>
                <input type="time" id="dailyTime" value="19:00" class="time-select">
            </div>
            <div class="settings-row">
                <span>Еженедельная сводка</span>
                <label class="switch"><input type="checkbox" id="weeklyEnabled"><span class="slider"></span></label>
            </div>
            <div class="settings-row">
                <label>День недели</label>
                <select id="weeklyDay" class="weekday-select">
                    <option value="0">Понедельник</option><option value="1">Вторник</option><option value="2">Среда</option>
                    <option value="3">Четверг</option><option value="4">Пятница</option><option value="5">Суббота</option>
                    <option value="6">Воскресенье</option>
                </select>
            </div>
            <div class="settings-row">
                <label>Время сводки</label>
                <input type="time" id="weeklyTime" value="19:00" class="time-select">
            </div>
            <button id="saveSettingsBtn" class="btn-secondary">💾 Сохранить настройки</button>
        </div>
    </div>

    <button id="testSendBtn" class="test-btn">🔍 Тест отправки настроек (10:17 ежедневно)</button>
</div>

<script>
    const BACKEND_URL = "https://test-hudeem-bot.onrender.com";
    const STORAGE_KEY = "weightLogTest";
    const NOTIF_KEY = "notifSettingsTest";

    let currentWeightLog = [];
    let notifSettings = { dailyEnabled: false, dailyTime: "19:00", weeklyEnabled: false, weeklyDay: 6, weeklyTime: "19:00" };

    const dateInput = document.getElementById('dateInput');
    const weightInput = document.getElementById('weightInput');
    const weightErrorDiv = document.getElementById('weightError');
    const saveBtn = document.getElementById('saveBtn');
    const dailyEnabledChk = document.getElementById('dailyEnabled');
    const dailyTimeInput = document.getElementById('dailyTime');
    const weeklyEnabledChk = document.getElementById('weeklyEnabled');
    const weeklyDaySelect = document.getElementById('weeklyDay');
    const weeklyTimeInput = document.getElementById('weeklyTime');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const testSendBtn = document.getElementById('testSendBtn');

    const notifHeader = document.getElementById('notifHeader');
    const notifContent = document.getElementById('notifContent');
    const headerArrow = document.getElementById('headerArrow');
    let isExpanded = false;

    function toggleNotifications() {
        isExpanded = !isExpanded;
        if (isExpanded) {
            notifContent.classList.add('show');
            headerArrow.classList.add('up');
        } else {
            notifContent.classList.remove('show');
            headerArrow.classList.remove('up');
        }
    }
    notifHeader.addEventListener('click', toggleNotifications);

    function getTodayDate() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }
    function setDefaultDate() { dateInput.value = getTodayDate(); }
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '1'; }, 10);
        setTimeout(() => { toast.remove(); }, 2200);
    }
    function isValidWeight(w) { return !isNaN(w) && w >= 20 && w <= 300; }

    function loadFromCloud(key, callback) {
        if (!window.Telegram?.WebApp?.CloudStorage) return callback(null);
        Telegram.WebApp.CloudStorage.getItem(key, (err, val) => {
            if (err || !val) callback(null);
            else try { callback(JSON.parse(val)); } catch(e) { callback(null); }
        });
    }
    function saveToCloud(key, data, callback) {
        if (!window.Telegram?.WebApp?.CloudStorage) return callback?.(false);
        Telegram.WebApp.CloudStorage.setItem(key, JSON.stringify(data), (err) => callback?.(!err));
    }

    function loadAllData() {
        loadFromCloud(STORAGE_KEY, (log) => {
            currentWeightLog = log || [];
        });
        loadFromCloud(NOTIF_KEY, (settings) => {
            if (settings) {
                notifSettings = settings;
                dailyEnabledChk.checked = notifSettings.dailyEnabled || false;
                dailyTimeInput.value = notifSettings.dailyTime || "19:00";
                weeklyEnabledChk.checked = notifSettings.weeklyEnabled || false;
                weeklyDaySelect.value = notifSettings.weeklyDay ?? 6;
                weeklyTimeInput.value = notifSettings.weeklyTime || "19:00";
            }
        });
    }

    function addOrUpdateWeight(date, weight) {
        let log = [...currentWeightLog];
        const idx = log.findIndex(e => e.date === date);
        if (idx !== -1 && !confirm(`Запись за ${date} уже существует (${log[idx].weight} кг). Перезаписать?`)) return false;
        const newEntry = { date, weight };
        if (idx !== -1) log[idx] = newEntry;
        else log.push(newEntry);
        saveToCloud(STORAGE_KEY, log, (ok) => {
            if (ok) {
                currentWeightLog = log;
                showToast("🎉 Вес сохранён (тест)");
                syncToBackend({ type: 'weight', date, weight });
            } else showToast("Ошибка сохранения");
        });
        return true;
    }

    async function syncToBackend(payload) {
        if (!BACKEND_URL) return;
        const tg = window.Telegram?.WebApp;
        const chatId = tg?.initDataUnsafe?.user?.id;
        if (!chatId) {
            console.log("Нет chat_id");
            return;
        }
        const fullPayload = { chat_id: chatId, ...payload };
        try {
            const response = await fetch(`${BACKEND_URL}/sync`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(fullPayload)
            });
            if (response.ok) {
                console.log("Отправлено на сервер");
            } else {
                console.warn("Ошибка сервера", response.status);
            }
        } catch(e) {
            console.warn("Ошибка отправки", e);
        }
    }

    function saveNotificationSettings() {
        const settings = {
            dailyEnabled: dailyEnabledChk.checked,
            dailyTime: dailyTimeInput.value,
            weeklyEnabled: weeklyEnabledChk.checked,
            weeklyDay: parseInt(weeklyDaySelect.value),
            weeklyTime: weeklyTimeInput.value
        };
        saveToCloud(NOTIF_KEY, settings, (ok) => {
            if (ok) {
                notifSettings = settings;
                showToast("Настройки сохранены локально");
                syncToBackend({ type: 'settings', settings: settings });
            } else {
                showToast("Ошибка сохранения локально");
            }
        });
    }

    function testSend() {
        const tg = Telegram.WebApp;
        const chatId = tg?.initDataUnsafe?.user?.id;
        if (!chatId) {
            alert("❌ Нет chat_id. Откройте приложение через бота в Telegram.");
            return;
        }
        const testPayload = {
            dailyEnabled: true,
            dailyTime: "10:17",
            weeklyEnabled: false,
            weeklyDay: 4,
            weeklyTime: "10:17"
        };
        fetch(BACKEND_URL + "/sync", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, type: 'settings', settings: testPayload })
        })
        .then(response => response.text().then(text => ({ status: response.status, text })))
        .then(({ status, text }) => {
            alert("✅ Успешно!\nСтатус: " + status + "\nОтвет: " + text);
        })
        .catch(err => {
            alert("❌ Ошибка: " + err.message);
        });
    }

    function handleSaveWeight() {
        let raw = weightInput.value.trim();
        if (raw === "") { weightErrorDiv.innerText = "Введите вес"; return; }
        raw = raw.replace(',', '.');
        const w = parseFloat(raw);
        if (!isValidWeight(w)) { weightErrorDiv.innerText = "Вес от 20 до 300 кг"; return; }
        const date = dateInput.value;
        if (!date) { weightErrorDiv.innerText = "Выберите дату"; return; }
        if (addOrUpdateWeight(date, w)) {
            weightInput.value = '';
            setDefaultDate();
        }
    }

    function init() {
        setDefaultDate();
        saveBtn.onclick = handleSaveWeight;
        saveSettingsBtn.onclick = saveNotificationSettings;
        testSendBtn.onclick = testSend;
        if (window.Telegram?.WebApp) {
            const tg = Telegram.WebApp;
            tg.expand();
        }
        loadAllData();
        isExpanded = false;
        notifContent.classList.remove('show');
        headerArrow.classList.remove('up');
    }
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
