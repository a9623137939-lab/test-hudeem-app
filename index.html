<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Контроль веса — Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f0f12;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #eeeeee;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }
        .app-container { max-width: 600px; margin: 0 auto; }
        .card {
            background-color: #1e1e24;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #b9b3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #2c2c34;
            padding: 6px 12px;
            border-radius: 40px;
        }
        .toggle-switch span {
            font-size: 14px;
            color: #cdcddf;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3a3a44; transition: 0.2s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 2px; bottom: 2px;
            background-color: white; transition: 0.2s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #6c5ce7; }
        input:checked + .slider:before { transform: translateX(24px); }
        .sub {
            color: #a0a0b0;
            font-size: 14px;
            margin-bottom: 24px;
            border-left: 3px solid #6c5ce7;
            padding-left: 12px;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #cdcddf;
        }
        input, select {
            width: 100%;
            background-color: #2c2c34;
            border: 1px solid #3a3a44;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 16px;
            color: #ffffff;
            outline: none;
        }
        input:focus, select:focus { border-color: #6c5ce7; box-shadow: 0 0 0 2px rgba(108,92,231,0.3); }
        .error-msg { color: #ff6b6b; font-size: 13px; margin-top: 6px; padding-left: 8px; }
        .btn-group, .flex-buttons { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
        button {
            background-color: #2c2c34;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            color: #eeeeee;
            cursor: pointer;
            flex: 1 0 auto;
        }
        .btn-primary { background-color: #6c5ce7; color: white; box-shadow: 0 2px 6px rgba(108,92,231,0.3); }
        .btn-primary:hover { background-color: #5f4fdb; transform: scale(0.98); }
        .btn-secondary { background-color: #2c2c34; border: 1px solid #4a4a56; }
        .btn-secondary:hover { background-color: #3a3a44; }
        .btn-danger { background-color: #3a2a2f; border: 1px solid #8a4a5a; color: #ffaaaa; }
        .stats-container {
            background-color: #1e1e24;
            border-radius: 24px;
            padding: 20px;
            margin-top: 8px;
        }
        .stats-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .no-data-message {
            background-color: #2a2a32;
            border-radius: 20px;
            padding: 32px 20px;
            text-align: center;
            color: #aaaaaa;
        }
        .weight-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 28px;
            border-radius: 18px;
            overflow: hidden;
            font-size: 14px;
        }
        .weight-table th, .weight-table td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid #2e2e38;
        }
        .weight-table th {
            background-color: #2a2a32;
            color: #cbcbff;
            font-size: 14px;
        }
        .chart-container { margin-top: 12px; height: 260px; width: 100%; }
        .girth-chart-container { margin-top: 28px; height: 260px; width: 100%; }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background-color: rgba(44,44,52,0.95);
            border-left: 4px solid #6c5ce7;
            border-radius: 60px;
            padding: 12px 24px;
            color: #f0f0f0;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        @media (max-width: 500px) {
            .toast-notification { white-space: normal; text-align: center; max-width: 85%; border-radius: 28px; }
            body { padding: 16px 12px 32px; }
            button { padding: 10px 14px; }
            .header-row { flex-direction: column; align-items: flex-start; }
            .weight-table th, .weight-table td { font-size: 12px; padding: 6px 4px; }
        }
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 8px 0;
        }
        .collapsible-header .title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .arrow {
            font-size: 24px;
            transition: transform 0.2s ease;
            user-select: none;
        }
        .arrow.up { transform: rotate(180deg); }
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            margin-top: 0;
        }
        .collapsible-content.show {
            max-height: 800px;
            transition: max-height 0.4s ease-in;
            margin-top: 20px;
        }
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .settings-row label { margin-bottom: 0; }
        .time-select, .weekday-select {
            background-color: #2c2c34;
            border-radius: 16px;
            padding: 10px;
        }
        .girth-field { transition: all 0.2s ease; }
        .test-btn {
            display: block;
            width: 100%;
            background-color: #6c5ce7;
            margin-top: 16px;
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="card">
        <div class="header-row">
            <h1>⚖️ Контроль веса</h1>
            <div class="toggle-switch">
                <span>Замер охвата</span>
                <label class="switch">
                    <input type="checkbox" id="girthToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div class="sub">Записывайте прогресс — стройте график</div>
        <div class="form-group">
            <label>📆 Дата</label>
            <input type="date" id="dateInput">
        </div>
        <div class="form-group">
            <label>⚡ Вес (кг)</label>
            <input type="number" id="weightInput" step="0.1" placeholder="например, 72.5">
            <div id="weightError" class="error-msg"></div>
        </div>
        <div class="form-group girth-field" id="girthGroup" style="display: none;">
            <label>📏 Охват (см)</label>
            <input type="number" id="girthInput" step="0.1" placeholder="например, 80.0">
            <div id="girthError" class="error-msg"></div>
        </div>
        <div class="btn-group">
            <button id="saveBtn" class="btn-primary">💾 Сохранить вес</button>
        </div>
    </div>

    <div class="card">
        <div class="collapsible-header" id="notifHeader">
            <div class="title"><span>🔔</span> Настройка уведомлений</div>
            <span class="arrow" id="headerArrow">▼</span>
        </div>
        <div class="collapsible-content" id="notifContent">
            <div class="settings-row">
                <span>Ежедневное напоминание</span>
                <label class="switch"><input type="checkbox" id="dailyEnabled"><span class="slider"></span></label>
            </div>
            <div class="settings-row">
                <label>Время отправки</label>
                <input type="time" id="dailyTime" value="19:00" class="time-select">
            </div>
            <div class="settings-row">
                <span>Еженедельная сводка</span>
                <label class="switch"><input type="checkbox" id="weeklyEnabled"><span class="slider"></span></label>
            </div>
            <div class="settings-row">
                <label>День недели</label>
                <select id="weeklyDay" class="weekday-select">
                    <option value="0">Понедельник</option><option value="1">Вторник</option><option value="2">Среда</option>
                    <option value="3">Четверг</option><option value="4">Пятница</option><option value="5">Суббота</option>
                    <option value="6">Воскресенье</option>
                </select>
            </div>
            <div class="settings-row">
                <label>Время сводки</label>
                <input type="time" id="weeklyTime" value="19:00" class="time-select">
            </div>
            <button id="saveSettingsBtn" class="btn-secondary">💾 Сохранить настройки</button>
        </div>
    </div>

    <div class="flex-buttons">
        <button id="showStatsBtn" class="btn-secondary">📊 Показать статистику</button>
        <button id="resetDataBtn" class="btn-danger">🗑️ Сбросить все данные</button>
    </div>

    <div id="statsBlock" class="stats-container" style="display: none;">
        <div class="stats-title">📈 История и графики</div>
        <div id="statsContent"></div>
    </div>

    <!-- ТЕСТОВАЯ КНОПКА -->
    <div class="card" style="margin-top: 20px;">
        <button id="testSendBtn" class="test-btn">🔍 Тест отправки настроек (10:17 ежедневно)</button>
        <div style="font-size: 12px; color: #aaa; margin-top: 8px; text-align: center;">
            Нажмите, чтобы проверить отправку на сервер. Результат появится во всплывающем окне.
        </div>
    </div>
</div>

<script>
    // ---------- Конфигурация ----------
    const BACKEND_URL = "https://test-hudeem-bot.onrender.com";
    const STORAGE_KEY = "weightLog";
    const NOTIF_KEY = "notifSettings";
    const GIRTH_MODE_KEY = "girthMode";

    let weightChart = null;
    let girthChart = null;
    let currentWeightLog = [];
    let notifSettings = { dailyEnabled: false, dailyTime: "19:00", weeklyEnabled: false, weeklyDay: 6, weeklyTime: "19:00" };
    let girthMode = false;

    // DOM элементы
    const dateInput = document.getElementById('dateInput');
    const weightInput = document.getElementById('weightInput');
    const weightErrorDiv = document.getElementById('weightError');
    const girthInput = document.getElementById('girthInput');
    const girthErrorDiv = document.getElementById('girthError');
    const girthGroup = document.getElementById('girthGroup');
    const girthToggle = document.getElementById('girthToggle');
    const saveBtn = document.getElementById('saveBtn');
    const showStatsBtn = document.getElementById('showStatsBtn');
    const resetDataBtn = document.getElementById('resetDataBtn');
    const statsBlock = document.getElementById('statsBlock');
    const statsContent = document.getElementById('statsContent');
    const dailyEnabledChk = document.getElementById('dailyEnabled');
    const dailyTimeInput = document.getElementById('dailyTime');
    const weeklyEnabledChk = document.getElementById('weeklyEnabled');
    const weeklyDaySelect = document.getElementById('weeklyDay');
    const weeklyTimeInput = document.getElementById('weeklyTime');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');

    const notifHeader = document.getElementById('notifHeader');
    const notifContent = document.getElementById('notifContent');
    const headerArrow = document.getElementById('headerArrow');
    let isExpanded = false;

    function toggleNotifications() {
        isExpanded = !isExpanded;
        if (isExpanded) {
            notifContent.classList.add('show');
            headerArrow.classList.add('up');
        } else {
            notifContent.classList.remove('show');
            headerArrow.classList.remove('up');
        }
    }
    notifHeader.addEventListener('click', toggleNotifications);

    function getTodayDate() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }
    function setDefaultDate() { dateInput.value = getTodayDate(); }
    function showToast(message, duration = 2200) {
        const existing = document.querySelector('.toast-notification');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '1'; toast.style.transform = 'translateX(-50%) scale(1)'; }, 10);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) scale(0.9)';
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 200);
        }, duration);
    }
    function clearWeightError() { weightErrorDiv.innerText = ''; }
    function clearGirthError() { if(girthErrorDiv) girthErrorDiv.innerText = ''; }
    function showWeightError(msg) { weightErrorDiv.innerText = msg; }
    function showGirthError(msg) { if(girthErrorDiv) girthErrorDiv.innerText = msg; }
    function isValidWeight(w) { return !isNaN(w) && w >= 20 && w <= 300; }
    function isValidGirth(g) { return !isNaN(g) && g >= 30 && g <= 300; }

    function loadFromCloud(key, callback) {
        if (!window.Telegram?.WebApp?.CloudStorage) return callback(null);
        Telegram.WebApp.CloudStorage.getItem(key, (err, val) => {
            if (err || !val) callback(null);
            else try { callback(JSON.parse(val)); } catch(e) { callback(null); }
        });
    }
    function saveToCloud(key, data, callback) {
        if (!window.Telegram?.WebApp?.CloudStorage) return callback?.(false);
        Telegram.WebApp.CloudStorage.setItem(key, JSON.stringify(data), (err) => callback?.(!err));
    }

    function loadAllData() {
        loadFromCloud(STORAGE_KEY, (log) => {
            if (log) currentWeightLog = log.map(entry => ({ ...entry, girth: entry.girth !== undefined ? entry.girth : null }));
            else currentWeightLog = [];
            if (statsBlock.style.display !== 'none') renderStatistics();
        });
        loadFromCloud(NOTIF_KEY, (settings) => {
            if (settings) {
                notifSettings = settings;
                dailyEnabledChk.checked = notifSettings.dailyEnabled || false;
                dailyTimeInput.value = notifSettings.dailyTime || "19:00";
                weeklyEnabledChk.checked = notifSettings.weeklyEnabled || false;
                weeklyDaySelect.value = notifSettings.weeklyDay ?? 6;
                weeklyTimeInput.value = notifSettings.weeklyTime || "19:00";
            }
        });
        loadFromCloud(GIRTH_MODE_KEY, (mode) => {
            girthMode = mode === true;
            girthToggle.checked = girthMode;
            girthGroup.style.display = girthMode ? 'block' : 'none';
            if (statsBlock.style.display !== 'none') renderStatistics();
        });
    }

    function addOrUpdateWeight(date, weight, girth = null) {
        let log = [...currentWeightLog];
        const idx = log.findIndex(e => e.date === date);
        if (idx !== -1) {
            let msg = `Запись за ${date} уже существует (${log[idx].weight} кг)`;
            if (log[idx].girth) msg += `, охват ${log[idx].girth} см`;
            if (!confirm(`${msg}. Перезаписать?`)) return false;
        }
        const newEntry = { date, weight, girth: (girth !== null && !isNaN(girth) && girth !== '') ? parseFloat(girth) : null };
        if (idx !== -1) log[idx] = newEntry;
        else log.push(newEntry);
        saveToCloud(STORAGE_KEY, log, (ok) => {
            if (ok) {
                currentWeightLog = log;
                showToast("🎉 Данные сохранены!");
                refreshStatisticsIfVisible();
                syncToBackend({ type: 'weight', date, weight, girth: newEntry.girth });
            } else showToast("Ошибка сохранения");
        });
        return true;
    }

    async function syncToBackend(payload) {
        if (!BACKEND_URL) return;
        const tg = window.Telegram?.WebApp;
        const chatId = tg?.initDataUnsafe?.user?.id;
        if (!chatId) {
            console.log("syncToBackend: нет chat_id");
            return;
        }
        const fullPayload = { chat_id: chatId, ...payload };
        try {
            const response = await fetch(`${BACKEND_URL}/sync`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(fullPayload)
            });
            if (response.ok) {
                console.log("syncToBackend: успешно отправлено");
            } else {
                console.warn("syncToBackend: сервер вернул", response.status);
            }
        } catch(e) {
            console.warn("syncToBackend: ошибка отправки", e);
        }
    }

    function saveNotificationSettings() {
        const settings = {
            dailyEnabled: dailyEnabledChk.checked,
            dailyTime: dailyTimeInput.value,
            weeklyEnabled: weeklyEnabledChk.checked,
            weeklyDay: parseInt(weeklyDaySelect.value),
            weeklyTime: weeklyTimeInput.value
        };
        saveToCloud(NOTIF_KEY, settings, (ok) => {
            if (ok) {
                notifSettings = settings;
                showToast("Настройки уведомлений сохранены");
                syncToBackend({ type: 'settings', settings: settings });
            } else {
                showToast("Ошибка сохранения настроек локально");
            }
        });
    }

    function saveGirthMode(enabled) {
        girthMode = enabled;
        saveToCloud(GIRTH_MODE_KEY, girthMode);
        girthGroup.style.display = girthMode ? 'block' : 'none';
        if (!girthMode) {
            clearGirthError();
            if (girthInput) girthInput.value = '';
        }
        if (statsBlock.style.display !== 'none') renderStatistics();
    }

    function refreshStatisticsIfVisible() {
        if (statsBlock.style.display !== 'none') renderStatistics();
    }

    function formatDateForChart(dateStr) {
        const months = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr;
        return `${date.getDate()}.${months[date.getMonth()]}`;
    }

    function getWeightYScale(data) {
        const weights = data.map(d => d.weight).filter(w => w !== null && !isNaN(w));
        if (weights.length === 0) return { min: 60, max: 100, stepSize: 1 };
        let minWeight = Math.min(...weights);
        let maxWeight = Math.max(...weights);
        return { min: Math.floor(minWeight - 5), max: Math.ceil(maxWeight + 5), stepSize: 1 };
    }

    function getGirthYScale(data) {
        const girths = data.map(d => d.girth).filter(g => g !== null && !isNaN(g));
        if (girths.length === 0) return { min: 50, max: 150, stepSize: 1 };
        let minGirth = Math.min(...girths);
        let maxGirth = Math.max(...girths);
        return { min: Math.floor(minGirth - 5), max: Math.ceil(maxGirth + 5), stepSize: 1 };
    }

    function renderStatistics() {
        const sorted = [...currentWeightLog].sort((a,b)=>a.date.localeCompare(b.date));
        if (sorted.length === 0) {
            statsContent.innerHTML = `<div class="no-data-message">📭 Нет данных. Добавьте первый вес!</div>`;
            if (weightChart) { weightChart.destroy(); weightChart = null; }
            if (girthChart) { girthChart.destroy(); girthChart = null; }
            return;
        }

        let html = `<table class="weight-table"><thead><tr><th>📅 Дата</th><th>⚖️ Вес (кг)</th>`;
        if (girthMode) html += `<th>📏 Охват (см)</th>`;
        html += `</tr></thead><tbody>`;
        for (let e of sorted) {
            html += `<tr><td>${e.date}</td><td>${e.weight.toFixed(1)} кг</td>`;
            if (girthMode) {
                let girthText = (e.girth !== null && e.girth !== undefined) ? e.girth.toFixed(1) + ' см' : '—';
                html += `<td>${girthText}</td>`;
            }
            html += `</tr>`;
        }
        html += `</tbody></table>`;
        html += `<div class="chart-container"><canvas id="weightChartCanvas"></canvas></div>`;
        if (girthMode) {
            html += `<div class="girth-chart-container"><canvas id="girthChartCanvas"></canvas></div>`;
        } else {
            html += `<div class="girth-chart-container" style="display: none;"></div>`;
        }
        statsContent.innerHTML = html;

        const weightCtx = document.getElementById('weightChartCanvas').getContext('2d');
        if (weightChart) weightChart.destroy();
        const weightLabels = sorted.map(e => formatDateForChart(e.date));
        const weightData = sorted.map(e => e.weight);
        const weightScale = getWeightYScale(sorted);
        weightChart = new Chart(weightCtx, {
            type: 'line',
            data: { labels: weightLabels, datasets: [{ label:'Вес (кг)', data: weightData, borderColor:'#6c5ce7', backgroundColor:'rgba(108,92,231,0.05)', borderWidth:3, pointRadius:4, tension:0.2, fill:true }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color:'#eee' } } }, scales: { x: { ticks: { color:'#ccc', maxRotation: 45, minRotation: 45 } }, y: { ticks: { color:'#ccc', stepSize: weightScale.stepSize, callback: (val) => Number.isInteger(val) ? val : '' }, min: weightScale.min, max: weightScale.max } } }
        });

        if (girthMode) {
            const girthCtx = document.getElementById('girthChartCanvas');
            if (girthCtx) {
                const ctx = girthCtx.getContext('2d');
                if (girthChart) girthChart.destroy();
                const girthEntries = sorted.filter(e => e.girth !== null && !isNaN(e.girth));
                if (girthEntries.length === 0) {
                    const container = document.querySelector('.girth-chart-container');
                    if (container) container.innerHTML = `<div class="no-data-message" style="height:260px; display:flex; align-items:center; justify-content:center;">📏 Нет данных об охвате</div>`;
                } else {
                    const girthLabels = girthEntries.map(e => formatDateForChart(e.date));
                    const girthData = girthEntries.map(e => e.girth);
                    const girthScale = getGirthYScale(girthEntries);
                    girthChart = new Chart(ctx, {
                        type: 'line',
                        data: { labels: girthLabels, datasets: [{ label:'Охват (см)', data: girthData, borderColor:'#e84393', backgroundColor:'rgba(232,67,147,0.05)', borderWidth:3, pointRadius:4, tension:0.2, fill:true }] },
                        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color:'#eee' } } }, scales: { x: { ticks: { color:'#ccc', maxRotation: 45, minRotation: 45 } }, y: { ticks: { color:'#ccc', stepSize: girthScale.stepSize, callback: (val) => Number.isInteger(val) ? val : '' }, min: girthScale.min, max: girthScale.max } } }
                    });
                }
            }
        } else if (girthChart) { girthChart.destroy(); girthChart = null; }
    }

    function resetAllData() {
        if (!confirm("Удалить все записи о весе и охватах?")) return;
        saveToCloud(STORAGE_KEY, [], (ok) => {
            if (ok) { currentWeightLog = []; showToast("Все данные удалены"); refreshStatisticsIfVisible(); syncToBackend({ type: 'reset' }); }
        });
    }

    function handleSaveWeight() {
        clearWeightError(); clearGirthError();
        let raw = weightInput.value.trim();
        if (raw === "") { showWeightError("Введите вес"); return; }
        raw = raw.replace(',', '.');
        const w = parseFloat(raw);
        if (!isValidWeight(w)) { showWeightError("Вес от 20 до 300 кг"); return; }
        const date = dateInput.value;
        if (!date) { showWeightError("Выберите дату"); return; }
        let girth = null;
        if (girthMode) {
            let rawGirth = girthInput.value.trim();
            if (rawGirth !== "") {
                rawGirth = rawGirth.replace(',', '.');
                const g = parseFloat(rawGirth);
                if (!isValidGirth(g)) { showGirthError("Охват от 30 до 300 см"); return; }
                girth = g;
            }
        }
        if (addOrUpdateWeight(date, w, girth)) {
            weightInput.value = '';
            if (girthInput) girthInput.value = '';
            setDefaultDate();
        }
    }

    function handleShowStats() {
        statsBlock.style.display = 'block';
        renderStatistics();
    }

    // Тестовая отправка
    function testSend() {
        const tg = Telegram.WebApp;
        const chatId = tg?.initDataUnsafe?.user?.id;
        if (!chatId) {
            alert("❌ Нет chat_id. Убедитесь, что открыли приложение через бота в Telegram, а не локально.");
            return;
        }
        const testPayload = {
            dailyEnabled: true,
            dailyTime: "10:17",
            weeklyEnabled: false,
            weeklyDay: 4,
            weeklyTime: "10:17"
        };
        fetch(BACKEND_URL + "/sync", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, type: 'settings', settings: testPayload })
        })
        .then(response => response.text())
        .then(text => {
            alert("✅ Успешно отправлено!\nСтатус: " + response.status + "\nОтвет: " + text);
            // после успеха проверить /debug в браузере
        })
        .catch(err => {
            alert("❌ Ошибка отправки: " + err.message);
        });
    }

    function init() {
        setDefaultDate();
        saveBtn.onclick = handleSaveWeight;
        showStatsBtn.onclick = handleShowStats;
        resetDataBtn.onclick = resetAllData;
        saveSettingsBtn.onclick = saveNotificationSettings;
        weightInput.oninput = clearWeightError;
        if (girthInput) girthInput.oninput = clearGirthError;
        weightInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSaveWeight(); });
        if (girthInput) girthInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSaveWeight(); });
        girthToggle.addEventListener('change', (e) => { saveGirthMode(e.target.checked); });
        document.getElementById('testSendBtn').onclick = testSend;
        if (window.Telegram?.WebApp) {
            const tg = Telegram.WebApp;
            tg.expand();
            tg.enableClosingConfirmation();
            tg.setHeaderColor('#0f0f12');
            tg.setBackgroundColor('#0f0f12');
        }
        loadAllData();
        isExpanded = false;
        notifContent.classList.remove('show');
        headerArrow.classList.remove('up');
    }
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
